name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision flake8 pytest
      - name: Lint
        run: flake8 main.py utils.py models/ --max-line-length=120
      - name: Smoke test
        run: python -c "import models; print(models.__all__ if hasattr(models, '__all__') else 'ok')"
